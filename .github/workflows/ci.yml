name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  test-stable:
    name: Test on stable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Dart (stable)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Validate release lane
        env:
          TARGET_LANE: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml | tr -d "\"'")
          stable_pattern='^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$'
          prerelease_pattern='^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+(\+[0-9A-Za-z.-]+)?$'

          if [[ "$TARGET_LANE" == 'main' && ! "$version" =~ $stable_pattern ]]; then
            echo "main requires a stable semantic version, got $version."
            exit 1
          fi
          if [[ "$TARGET_LANE" == 'dev' && ! "$version" =~ $prerelease_pattern ]]; then
            echo "dev requires a prerelease semantic version, got $version."
            exit 1
          fi

      - name: Install dependencies
        run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test

  test-minimum:
    name: Test on Dart 3.11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Dart 3.11
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.0
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test

  test-beta:
    name: Test on beta
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Dart (beta)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: beta
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test

  pana:
    name: Pana
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Dart (stable)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Install pana
        run: dart pub global activate pana 0.23.14
      - name: Run pana
        run: pana --exit-code-threshold 0 .

  flutter-example:
    name: Flutter showcase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: examples/flutter_link_preview
        run: flutter pub get
      - name: Check formatting
        working-directory: examples/flutter_link_preview
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        working-directory: examples/flutter_link_preview
        run: flutter analyze
      - name: Test
        working-directory: examples/flutter_link_preview
        run: flutter test
