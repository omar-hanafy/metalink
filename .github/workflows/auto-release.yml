name: Auto release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.repository }}-metalink-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.TAG_PUSH_PAT }}

      - name: Verify tag push credential
        env:
          TAG_PUSH_PAT: ${{ secrets.TAG_PUSH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TAG_PUSH_PAT" ]]; then
            echo 'TAG_PUSH_PAT is required so a pushed tag can trigger publishing.'
            exit 1
          fi

      - name: Compare package versions
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail

          before="$BEFORE_SHA"
          if [[ "$before" =~ ^0+$ ]]; then
            echo 'Branch creation detected; no release tag will be created.'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml | tr -d "\"'")
          if [[ -z "$new_version" ]]; then
            echo 'Unable to read version from pubspec.yaml.'
            exit 1
          fi

          if git cat-file -e "$before:pubspec.yaml" 2>/dev/null; then
            old_version=$(git show "$before:pubspec.yaml" | awk '/^version:/ {print $2; exit}' | tr -d "\"'")
          else
            old_version=''
          fi

          if [[ "$old_version" == "$new_version" ]]; then
            echo "Version remains $new_version; no release tag will be created."
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          stable_pattern='^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$'
          prerelease_pattern='^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+(\+[0-9A-Za-z.-]+)?$'

          if [[ "$GITHUB_REF_NAME" == 'main' && ! "$new_version" =~ $stable_pattern ]]; then
            echo "main requires a stable semantic version, got $new_version."
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" == 'dev' && ! "$new_version" =~ $prerelease_pattern ]]; then
            echo "dev requires a prerelease semantic version, got $new_version."
            exit 1
          fi

          {
            echo 'changed=true'
            echo "value=$new_version"
            echo "tag=metalink-v$new_version"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tag is new
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || \
              git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists. Never move or reuse a release tag."
            exit 1
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          args=("$RELEASE_TAG" --verify-tag --generate-notes --target "$GITHUB_SHA")
          if [[ "$GITHUB_REF_NAME" == 'dev' ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
